<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Patterns — Complete Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --bg4: #22222e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --faint: #3a3a5a;
    --array:  #4f9ef8;
    --tree:   #3ecf8e;
    --graph:  #a78bfa;
    --dp:     #fb923c;
    --ll:     #f472b6;
    --heap:   #facc15;
    --bt:     #34d399;
    --trie:   #22d3ee;
    --e: #3ecf8e;
    --m: #fb923c;
    --h: #f87171;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }
  header {
    position: relative;
    padding: 56px 40px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d0d18 0%, var(--bg) 100%);
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute; top: -60px; left: -60px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(79,158,248,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-inner { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
  .logo-line { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .logo-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    background: var(--array); color: #000;
    padding: 3px 9px; border-radius: 4px; letter-spacing: 0.08em;
  }
  h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800; line-height: 1.05; letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 30%, var(--muted) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { margin-top: 10px; font-size: 15px; color: var(--muted); font-weight: 400; }
  .header-stats { display: flex; gap: 24px; margin-top: 24px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 12px; color: var(--muted); }

  .controls-wrap {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 12px 40px;
  }
  .controls-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
  }
  #search {
    width: 100%; padding: 9px 12px 9px 36px;
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--array); }
  #search::placeholder { color: var(--faint); }
  .diff-btns { display: flex; gap: 6px; }
  .df {
    padding: 7px 13px; border-radius: 6px;
    border: 1px solid var(--border2); background: transparent;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em;
  }
  .df[data-d="e"] { color: var(--e); }
  .df[data-d="m"] { color: var(--m); }
  .df[data-d="h"] { color: var(--h); }
  .df.on[data-d="e"] { background: rgba(62,207,142,0.12); border-color: var(--e); }
  .df.on[data-d="m"] { background: rgba(251,146,60,0.12); border-color: var(--m); }
  .df.on[data-d="h"] { background: rgba(248,113,113,0.12); border-color: var(--h); }

  .cat-bar {
    padding: 0 40px; border-bottom: 1px solid var(--border);
    background: var(--bg2); overflow-x: auto; scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-bar-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 2px; padding: 8px 0; }
  .cat-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 6px;
    border: none; background: transparent;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .cat-btn:hover { color: var(--text); background: var(--bg3); }
  .cat-btn.active { color: var(--text); background: var(--bg4); }
  .cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  main { max-width: 1200px; margin: 0 auto; padding: 32px 40px 80px; }
  .result-bar {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--muted); margin-bottom: 20px; letter-spacing: 0.05em;
  }
  .result-bar span { color: var(--text); font-weight: 700; }

  .section {
    margin-bottom: 10px; border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; background: var(--bg2);
    transition: border-color 0.2s;
  }
  .section:hover { border-color: var(--border2); }
  .sec-header {
    padding: 14px 18px; display: flex; align-items: center;
    justify-content: space-between; cursor: pointer;
    background: var(--bg3); transition: background 0.15s; gap: 10px;
  }
  .sec-header:hover { background: var(--bg4); }
  .sec-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .sec-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .cat-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; letter-spacing: 0.06em;
  }
  .count-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
    background: var(--bg); border: 1px solid var(--border2); padding: 1px 8px; border-radius: 4px;
  }
  .chevron { font-size: 10px; color: var(--faint); transition: transform 0.2s; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .sec-header.open .chevron { transform: rotate(180deg); }
  .sec-body { display: none; }
  .sec-body.open { display: block; }
  .pattern-tip {
    padding: 10px 18px; font-size: 12px; color: var(--muted);
    line-height: 1.7; border-bottom: 1px solid var(--border);
    background: var(--bg); font-family: 'JetBrains Mono', monospace;
  }
  .pattern-tip::before { content: '// '; color: var(--faint); }

  .q-row {
    padding: 10px 18px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border); transition: background 0.12s;
  }
  .q-row:last-child { border-bottom: none; }
  .q-row:hover { background: var(--bg3); }
  .q-num {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--faint); min-width: 24px; flex-shrink: 0;
  }
  .q-link {
    font-size: 13px; color: var(--text); flex: 1; line-height: 1.5;
    text-decoration: none; font-weight: 400;
    transition: color 0.15s;
  }
  .q-link:hover { color: var(--array); }
  .q-link:hover .ext-icon { opacity: 1; }
  .ext-icon {
    font-size: 10px; margin-left: 5px;
    color: var(--array); opacity: 0;
    transition: opacity 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .lc-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
    background: rgba(255,161,22,0.1); color: #ffa116;
    border: 1px solid rgba(255,161,22,0.2);
    text-decoration: none; transition: all 0.15s;
  }
  .lc-badge:hover { background: rgba(255,161,22,0.2); }
  .gfg-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
    background: rgba(22,163,74,0.1); color: #16a34a;
    border: 1px solid rgba(22,163,74,0.2);
    text-decoration: none; transition: all 0.15s;
  }
  .gfg-badge:hover { background: rgba(22,163,74,0.2); }
  .q-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .diff-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 4px; letter-spacing: 0.04em; flex-shrink: 0;
  }
  .d-e { background: rgba(62,207,142,0.12); color: var(--e); }
  .d-m { background: rgba(251,146,60,0.12); color: var(--m); }
  .d-h { background: rgba(248,113,113,0.12); color: var(--h); }
  .tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--faint);
    padding: 1px 6px; border-radius: 3px; border: 1px solid var(--border);
  }
  .q-row:hover .tag { border-color: var(--border2); color: var(--muted); }

  .empty-state { padding: 60px 40px; text-align: center; }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { color: var(--muted); font-size: 14px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 640px) {
    header, .controls-wrap, .cat-bar { padding-left: 16px; padding-right: 16px; }
    main { padding: 20px 16px 60px; }
    h1 { font-size: 28px; }
    .tag { display: none; }
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .section { animation: fadeIn 0.25s ease both; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-line">
      <span class="logo-chip">DSA</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)">Complete Reference</span>
    </div>
    <h1>Patterns &<br>Questions</h1>
    <p class="subtitle">200+ problems with LeetCode links — organised by pattern</p>
    <div class="header-stats">
      <div class="stat"><span class="stat-num" id="total-q">0</span><span class="stat-label">Questions</span></div>
      <div class="stat"><span class="stat-num">25</span><span class="stat-label">Patterns</span></div>
      <div class="stat"><span class="stat-num">8</span><span class="stat-label">Categories</span></div>
    </div>
  </div>
</header>

<div class="controls-wrap">
  <div class="controls-inner">
    <div class="search-wrap">
      <span class="search-icon">/&gt;</span>
      <input id="search" placeholder="Search questions or tags..." autocomplete="off" spellcheck="false">
    </div>
    <div class="diff-btns">
      <button class="df on" data-d="e" onclick="toggleDiff('e',this)">EASY</button>
      <button class="df on" data-d="m" onclick="toggleDiff('m',this)">MED</button>
      <button class="df on" data-d="h" onclick="toggleDiff('h',this)">HARD</button>
    </div>
  </div>
</div>

<div class="cat-bar">
  <div class="cat-bar-inner" id="cat-bar"></div>
</div>

<main>
  <div class="result-bar" id="result-bar"></div>
  <div id="content"></div>
</main>

<script>
const CATS = {
  array: { label:'Arrays',       color:'#4f9ef8' },
  tree:  { label:'Trees',        color:'#3ecf8e' },
  graph: { label:'Graphs',       color:'#a78bfa' },
  dp:    { label:'DP',           color:'#fb923c' },
  ll:    { label:'Linked List',  color:'#f472b6' },
  heap:  { label:'Heap',         color:'#facc15' },
  bt:    { label:'Backtracking', color:'#34d399' },
  trie:  { label:'Tries',        color:'#22d3ee' },
};

// lc: leetcode slug  |  gfg: gfg url (used when no LC equivalent)
const DATA = [
  // ════════════════════════════════ ARRAYS ════════════════════════════════
  { id:'two-ptr', cat:'array', label:'Two Pointers',
    tip:'Move pointers inward or same direction based on condition. Works on sorted arrays and string palindromes.',
    qs:[
      {t:'Two Sum II – Input Array Is Sorted',    d:'e', lc:'two-sum-ii-input-array-is-sorted',    tags:['sorted']},
      {t:'3Sum',                                   d:'m', lc:'3sum',                                tags:['dedup','sort']},
      {t:'4Sum',                                   d:'m', lc:'4sum',                                tags:['dedup']},
      {t:'Container With Most Water',              d:'m', lc:'container-with-most-water',           tags:['greedy']},
      {t:'Trapping Rain Water',                    d:'h', lc:'trapping-rain-water',                 tags:['prefix/suffix']},
      {t:'Remove Duplicates from Sorted Array',    d:'e', lc:'remove-duplicates-from-sorted-array', tags:['in-place']},
      {t:'Move Zeroes',                            d:'e', lc:'move-zeroes',                         tags:['in-place']},
      {t:'Sort Colors',                            d:'m', lc:'sort-colors',                         tags:['3-way partition']},
      {t:'Valid Palindrome',                       d:'e', lc:'valid-palindrome',                    tags:['string']},
      {t:'Squares of a Sorted Array',              d:'e', lc:'squares-of-a-sorted-array',           tags:['merge']},
    ]},
  { id:'sliding', cat:'array', label:'Sliding Window',
    tip:'Expand right, shrink left when constraint breaks. Pair with hashmap for string windows.',
    qs:[
      {t:'Maximum Average Subarray I',                       d:'e', lc:'maximum-average-subarray-i',                         tags:['fixed']},
      {t:'Longest Substring Without Repeating Characters',   d:'m', lc:'longest-substring-without-repeating-characters',     tags:['hashmap']},
      {t:'Minimum Window Substring',                         d:'h', lc:'minimum-window-substring',                           tags:['hashmap']},
      {t:'Fruit Into Baskets',                               d:'m', lc:'fruit-into-baskets',                                 tags:['hashmap']},
      {t:'Longest Substring with At Most K Distinct Chars',  d:'m', lc:'longest-substring-with-at-most-k-distinct-characters', tags:['hashmap']},
      {t:'Permutation in String',                            d:'m', lc:'permutation-in-string',                              tags:['freq count']},
      {t:'Find All Anagrams in a String',                    d:'m', lc:'find-all-anagrams-in-a-string',                      tags:['freq count']},
      {t:'Max Consecutive Ones III',                         d:'m', lc:'max-consecutive-ones-iii',                           tags:['binary']},
      {t:'Sliding Window Maximum',                           d:'h', lc:'sliding-window-maximum',                             tags:['deque','monotonic']},
      {t:'Minimum Size Subarray Sum',                        d:'m', lc:'minimum-size-subarray-sum',                          tags:['variable']},
    ]},
  { id:'prefix', cat:'array', label:'Prefix Sum / Difference Array',
    tip:'Range sum O(1) after O(n) build. Difference array gives O(1) range updates.',
    qs:[
      {t:'Range Sum Query – Immutable',          d:'e', lc:'range-sum-query-immutable',             tags:['prefix']},
      {t:'Subarray Sum Equals K',                d:'m', lc:'subarray-sum-equals-k',                 tags:['hashmap','prefix']},
      {t:'Contiguous Array',                     d:'m', lc:'contiguous-array',                      tags:['hashmap','prefix']},
      {t:'Product of Array Except Self',         d:'m', lc:'product-of-array-except-self',          tags:['prefix/suffix']},
      {t:'Range Sum Query 2D – Immutable',       d:'m', lc:'range-sum-query-2d-immutable',          tags:['2D prefix']},
      {t:'Car Pooling',                          d:'m', lc:'car-pooling',                           tags:['diff array']},
      {t:'Corporate Flight Bookings',            d:'m', lc:'corporate-flight-bookings',             tags:['diff array']},
      {t:'Number of Subarrays with Odd Sum',     d:'m', lc:'number-of-sub-arrays-with-odd-sum',     tags:['parity']},
    ]},
  { id:'hash', cat:'array', label:'Hashing / Frequency',
    tip:'O(1) lookup turns O(n²) brute force into O(n). Great for pairs, duplicates, anagram checks.',
    qs:[
      {t:'Two Sum',                          d:'e', lc:'two-sum',                          tags:['classic']},
      {t:'Group Anagrams',                   d:'m', lc:'group-anagrams',                   tags:['sort key']},
      {t:'Top K Frequent Elements',          d:'m', lc:'top-k-frequent-elements',          tags:['bucket sort','heap']},
      {t:'Longest Consecutive Sequence',     d:'m', lc:'longest-consecutive-sequence',     tags:['hashset']},
      {t:'Find the Duplicate Number',        d:'m', lc:'find-the-duplicate-number',        tags:['cycle','Floyd']},
      {t:'First Missing Positive',           d:'h', lc:'first-missing-positive',           tags:['index hash']},
      {t:'Majority Element',                 d:'e', lc:'majority-element',                 tags:['voting']},
      {t:'Majority Element II',              d:'m', lc:'majority-element-ii',              tags:['voting']},
      {t:'Isomorphic Strings',               d:'e', lc:'isomorphic-strings',               tags:['bijection']},
      {t:'Ransom Note',                      d:'e', lc:'ransom-note',                      tags:['freq count']},
    ]},
  { id:'binary', cat:'array', label:'Binary Search',
    tip:'Also use on answer space — define a feasibility predicate and binary search over it.',
    qs:[
      {t:'Binary Search',                             d:'e', lc:'binary-search',                            tags:['classic']},
      {t:'Search in Rotated Sorted Array',            d:'m', lc:'search-in-rotated-sorted-array',           tags:['rotated']},

      {t:'Koko Eating Bananas',                       d:'m', lc:'koko-eating-bananas',                      tags:['BS on answer']},
      {t:'Capacity To Ship Packages Within D Days',   d:'m', lc:'capacity-to-ship-packages-within-d-days',  tags:['BS on answer']},

    ]},
  { id:'sort', cat:'array', label:'Sorting Tricks',
    tip:'Custom sort, interval merge, sweep line. Most greedy problems need a sort step first.',
    qs:[
      {t:'Merge Intervals',              d:'m', lc:'merge-intervals',              tags:['intervals']},
      {t:'Insert Interval',              d:'m', lc:'insert-interval',              tags:['intervals']},
      {t:'Non-overlapping Intervals',    d:'m', lc:'non-overlapping-intervals',    tags:['greedy']},
      {t:'Meeting Rooms II',             d:'m', lc:'meeting-rooms-ii',             tags:['heap','sweep']},
      {t:'Largest Number',               d:'m', lc:'largest-number',               tags:['custom cmp']},
      {t:'H-Index',                      d:'m', lc:'h-index',                      tags:['counting sort']},
      {t:'Maximum Gap',                  d:'h', lc:'maximum-gap',                  tags:['bucket sort','pigeonhole']},
    ]},
  { id:'kadane', cat:'array', label:'Kadane / Subarray DP',
    tip:'Max/min subarray. Extend with extra state for product, circular, or stock variants.',
    qs:[
      {t:'Maximum Subarray',                          d:'m', lc:'maximum-subarray',                              tags:['kadane','classic']},
      {t:'Maximum Product Subarray',                  d:'m', lc:'maximum-product-subarray',                      tags:['min/max track']},
      {t:'Maximum Sum Circular Subarray',             d:'m', lc:'maximum-sum-circular-subarray',                 tags:['complement']},
      {t:'Best Time to Buy and Sell Stock',           d:'e', lc:'best-time-to-buy-and-sell-stock',               tags:['prefix min']},
      {t:'Best Time to Buy and Sell Stock II',        d:'m', lc:'best-time-to-buy-and-sell-stock-ii',            tags:['greedy']},
      {t:'Best Time to Buy and Sell Stock III',       d:'h', lc:'best-time-to-buy-and-sell-stock-iii',           tags:['state machine']},
      {t:'Best Time to Buy and Sell Stock IV',        d:'h', lc:'best-time-to-buy-and-sell-stock-iv',            tags:['dp']},
      {t:'Subarray Product Less Than K',              d:'m', lc:'subarray-product-less-than-k',                  tags:['two pointers']},
    ]},
  { id:'mono-stack', cat:'array', label:'Monotonic Stack',
    tip:'Maintain inc/dec stack for next greater/smaller. Core for spans, histograms, temperatures.',
    qs:[
      {t:'Next Greater Element I',                d:'e', lc:'next-greater-element-i',            tags:['classic']},
      {t:'Next Greater Element II',               d:'m', lc:'next-greater-element-ii',           tags:['circular']},
      {t:'Daily Temperatures',                    d:'m', lc:'daily-temperatures',                tags:['classic']},
      {t:'Largest Rectangle in Histogram',        d:'h', lc:'largest-rectangle-in-histogram',   tags:['classic']},
      {t:'Trapping Rain Water',                   d:'h', lc:'trapping-rain-water',               tags:['area']},
      {t:'Sum of Subarray Minimums',              d:'m', lc:'sum-of-subarray-minimums',          tags:['contribution']},
      {t:'132 Pattern',                           d:'m', lc:'132-pattern',                       tags:['ordering']},
      {t:'Remove K Digits',                       d:'m', lc:'remove-k-digits',                   tags:['greedy']},

      {t:'Word Search II',                      d:'h', lc:'word-search-ii',                       tags:['trie','pruning']},
      {t:'Restore IP Addresses',                d:'m', lc:'restore-ip-addresses',                 tags:['pruning']},
      {t:'Palindrome Partitioning',             d:'m', lc:'palindrome-partitioning',              tags:['partition']},
      {t:'Expression Add Operators',            d:'h', lc:'expression-add-operators',             tags:['expression eval']},
      {t:'Remove Invalid Parentheses',          d:'h', lc:'remove-invalid-parentheses',           tags:['BFS/backtrack']},
      {t:'Beautiful Arrangement',               d:'m', lc:'beautiful-arrangement',                tags:['permutation','pruning']},
    ]},

  // ════════════════════════════════ TRIES ════════════════════════════════
  { id:'trie-basic', cat:'trie', label:'Trie (Prefix Tree)',
    tip:'Insert/search/startsWith in O(L). TrieNode with children[26] and isEnd flag.',
    qs:[
      {t:'Implement Trie (Prefix Tree)',         d:'m', lc:'implement-trie-prefix-tree',           tags:['design','classic']},
      {t:'Design Add and Search Words Data Structure', d:'m', lc:'design-add-and-search-words-data-structure', tags:['DFS on trie']},
      {t:'Word Search II',                       d:'h', lc:'word-search-ii',                       tags:['trie + backtrack']},
      {t:'Replace Words',                        d:'m', lc:'replace-words',                        tags:['prefix lookup']},
      {t:'Maximum XOR of Two Numbers in an Array', d:'m', lc:'maximum-xor-of-two-numbers-in-an-array', tags:['binary trie']},
      {t:'Implement Magic Dictionary',           d:'m', lc:'implement-magic-dictionary',           tags:['edit distance','trie']},
      {t:'Longest Word in Dictionary',           d:'m', lc:'longest-word-in-dictionary',           tags:['BFS on trie']},
      {t:'Map Sum Pairs',                        d:'m', lc:'map-sum-pairs',                        tags:['design','prefix sum']},
      {t:'Search Suggestions System',            d:'m', lc:'search-suggestions-system',            tags:['sorted trie']},
    ]},
];

// ── STATE ──
let activeCat = 'all';
let query = '';
let diffs = new Set(['e','m','h']);
const diffLabels = { e:'Easy', m:'Medium', h:'Hard' };

// ── TOTAL COUNT ──
const totalQ = DATA.reduce((s,sec) => s + sec.qs.length, 0);
document.getElementById('total-q').textContent = totalQ;

// ── EVENTS ──
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.toLowerCase(); render();
});
function toggleDiff(d, btn) {
  if (diffs.has(d)) diffs.delete(d); else diffs.add(d);
  btn.classList.toggle('on', diffs.has(d));
  render();
}
function setCat(id) { activeCat = id; renderCatBar(); render(); }

// ── CAT BAR ──
function renderCatBar() {
  const el = document.getElementById('cat-bar');
  const cats = [{ id:'all', label:'All', color:'#7a7a9a' },
    ...Object.entries(CATS).map(([id,c]) => ({ id, ...c }))];
  el.innerHTML = cats.map(c => `
    <button class="cat-btn${activeCat===c.id?' active':''}" onclick="setCat('${c.id}')">
      <span class="cat-dot" style="background:${c.color}"></span>${c.label}
    </button>`).join('');
}

// ── RENDER ──
function render() {
  const sections = activeCat === 'all' ? DATA : DATA.filter(s => s.cat === activeCat);
  let totalVis = 0; let secVis = 0; let html = '';

  sections.forEach((s, si) => {
    const qs = s.qs.filter(q =>
      diffs.has(q.d) &&
      (!query || q.t.toLowerCase().includes(query) || q.tags.some(t => t.toLowerCase().includes(query)))
    );
    if (!qs.length) return;
    totalVis += qs.length; secVis++;
    const cat = CATS[s.cat];
    const isOpen = activeCat === s.cat || !!query;

    html += `<div class="section" style="animation-delay:${si*0.03}s">
      <div class="sec-header${isOpen?' open':''}" onclick="toggleSec(this)">
        <div class="sec-left">
          <span class="cat-dot" style="background:${cat.color}"></span>
          <span class="sec-title">${s.label}</span>
          <span class="cat-pill" style="background:${cat.color}18;color:${cat.color}">${cat.label}</span>
          <span class="count-badge">${qs.length}q</span>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="sec-body${isOpen?' open':''}">
        <div class="pattern-tip">${s.tip}</div>
        ${qs.map((q,i) => {
          const href = q.lc
            ? `https://leetcode.com/problems/${q.lc}/`
            : q.gfg || '#';
          const platform = q.lc ? 'LC' : 'GFG';
          const badgeClass = q.lc ? 'lc-badge' : 'gfg-badge';
          return `
          <div class="q-row">
            <span class="q-num">${String(i+1).padStart(2,'0')}</span>
            <a class="q-link" href="${href}" target="_blank" rel="noopener">
              ${q.t}<span class="ext-icon">↗</span>
            </a>
            <div class="q-right">
              <span class="diff-badge d-${q.d}">${diffLabels[q.d]}</span>
              <a class="${badgeClass}" href="${href}" target="_blank" rel="noopener">${platform}</a>
              ${q.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html || `
    <div class="empty-state">
      <div class="big">◌</div>
      <p>No questions match your filters.</p>
    </div>`;

  document.getElementById('result-bar').innerHTML =
    `Showing <span>${totalVis}</span> questions across <span>${secVis}</span> patterns`;
}

function toggleSec(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

// ── INIT ──
renderCatBar();
render();
</script>
</body>
</html>
